blueprint:
  name: Tibber Smart Device Schedule
  description: >
    Plant ein beliebiges Gerät basierend auf den günstigsten Tibber-Strompreisen in einem bestimmten Zeitfenster.
    Das Gerät wird automatisch ein- und ausgeschaltet, damit es exakt in den billigsten Stunden läuft.
  domain: automation
  input:
    target_entity:
      name: Gerät (Switch/Light/Plug)
      description: Das Gerät, das gesteuert werden soll (z.B. switch.waschmaschine, switch.poolpumpe).
      selector:
        entity:
          domain:
            - switch
            - light
            - input_boolean
    duration_hours:
      name: Laufzeit (Stunden)
      description: Wie viele Stunden soll das Gerät insgesamt laufen? (Kann auch Komma enthalten z.B. 2.5)
      default: 2.0
      selector:
        number:
          min: 0.25
          max: 24.0
          step: 0.25
          unit_of_measurement: h
          mode: slider
    start_time:
      name: Zeitfenster (Start)
      description: Ab wann darf das Gerät frühestens laufen? (z.B. 08:00)
      default: "00:00"
      selector:
        time:
    end_time:
      name: Zeitfenster (Ende)
      description: Bis wann muss das Gerät fertig sein? (z.B. 18:00)
      default: "23:59"
      selector:
        time:

mode: restart

trigger:
  # Evaluates every 15 minutes
  - platform: time_pattern
    minutes: "/15"
  # Evaluates on HA start
  - platform: homeassistant
    event: start
  # Evaluates manually
  - platform: event
    event_type: "tibber_force_evaluation"

action:
  - action: pyscript.tibber_evaluate_device
    data:
      target_entity: !input target_entity
      hours: !input duration_hours
      start_time: !input start_time
      end_time: !input end_time
