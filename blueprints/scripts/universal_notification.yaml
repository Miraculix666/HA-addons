---
blueprint:
  name: Universal Notification Engine
  description: >
    Ein universelles Routing-Skript für Benachrichtigungen.
    Sendet Alarme dynamisch an Companion Apps, Web-UI, Alexa, Google Home, WhatsApp oder Telegram.
  domain: script
  input:
    message:
      name: Nachricht
      description: Der zu sendende Text.
      selector:
        text:
          multiline: true
    title:
      name: Titel
      description: Titel der Benachrichtigung (optional, für Companion Apps/Telegram/Web-UI)
      default: "Home Assistant"
      selector:
        text:
    use_ui:
      name: HA Web-UI (Persistent Notification)
      description: Zeigt die Benachrichtigung in der Home Assistant Weboberfläche an (Glocken-Symbol)
      default: true
      selector:
        boolean:
    use_companion:
      name: Companion App
      description: Sende Push-Benachrichtigung an alle angemeldeten Handys
      default: true
      selector:
        boolean:
    use_alexa:
      name: Alexa TTS
      description: Sende Sprachausgabe an Alexa-Geräte
      default: false
      selector:
        boolean:
    use_google:
      name: Google Home TTS
      description: Sende Sprachausgabe an Google Assistant
      default: false
      selector:
        boolean:
    use_whatsapp:
      name: WhatsApp
      description: Sende via WhatsApp (sofern konfiguriert)
      default: false
      selector:
        boolean:
    use_telegram:
      name: Telegram
      description: Sende via Telegram (sofern konfiguriert)
      default: false
      selector:
        boolean:

sequence:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_ui }}"
        sequence:
          - action: persistent_notification.create
            data:
              title: "{{ title }}"
              message: "{{ message }}"
            continue_on_error: true

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_companion }}"
        sequence:
          - action: notify.send_message
            target:
              entity_id: notify.notify
            data:
              title: "{{ title }}"
              message: "{{ message }}"
            continue_on_error: true

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_alexa }}"
        sequence:
          - action: notify.send_message
            target:
              entity_id: notify.alexa_media
            data:
              message: "{{ message }}"
              data:
                type: tts
            continue_on_error: true

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_google }}"
        sequence:
          - action: tts.google_translate_say
            data:
              message: "{{ message }}"
            target:
              entity_id: all
            continue_on_error: true

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_whatsapp }}"
        sequence:
          - action: notify.send_message
            target:
              entity_id: notify.whatsapp
            data:
              message: "{{ message }}"
            continue_on_error: true

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_telegram }}"
        sequence:
          - action: notify.send_message
            target:
              entity_id: notify.telegram
            data:
              message: "{{ title }}\n{{ message }}"
            continue_on_error: true
